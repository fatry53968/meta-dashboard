<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META 廣告數據儀表板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0eeea;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --blue: #1877f2; --green: #2e7d32; --red: #c62828; --amber: #e65100;
    --green-bg: #e8f5e9; --red-bg: #ffebee; --amber-bg: #fff3e0; --blue-bg: #e3f2fd;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .top-bar { background: #1877f2; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { color: #fff; font-size: 17px; font-weight: 600; }
  .date-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 20px; }
  .refresh-btn { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: rgba(255,255,255,0.3); }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  .client-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .client-tab { padding: 10px 20px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--surface); font-size: 14px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  .client-tab.active { background: #1877f2; color: #fff; border-color: #1877f2; }
  .client-tab:hover:not(.active) { background: var(--surface2); }

  .client-panel { display: none; }
  .client-panel.active { display: block; }

  .status-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .status-dot.loading { background: #ffa000; animation: pulse 1s infinite; }
  .status-dot.ok { background: #2e7d32; }
  .status-dot.error { background: #c62828; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error-msg { background: var(--red-bg); border: 0.5px solid #ef9a9a; border-radius: var(--radius); padding: 14px 16px; color: var(--red); font-size: 13px; margin-bottom: 16px; }

  /* ── 日報 ── */
  .daily-report-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .daily-report-header { background: linear-gradient(135deg,#0d47a1 0%,#1877f2 100%); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .daily-report-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
  .copy-btn { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
  .copy-btn:hover { background: rgba(255,255,255,0.35); }
  .copy-btn.copied { background: rgba(46,125,50,0.6); }
  .daily-report-body { padding: 18px 20px; }
  .report-section { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 0.5px solid var(--border); }
  .report-section:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .report-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .report-text { font-size: 14px; color: var(--text); line-height: 1.9; }
  .report-loading { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
  .kpi-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .kpi-chip { background: var(--surface2); border-radius: 8px; padding: 8px 14px; min-width: 90px; }
  .kpi-chip-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .kpi-chip-value { font-size: 16px; font-weight: 700; color: var(--text); }

  /* ── 其他 ── */
  .day-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .day-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .day-card h3 { font-size: 13px; font-weight: 500; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .day-dot-today { width:8px;height:8px;border-radius:50%;background:#1877f2; }
  .day-dot-yest  { width:8px;height:8px;border-radius:50%;background:#aaa; }
  .kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .kpi { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .kpi-value { font-size: 18px; font-weight: 600; color: var(--text); }

  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 10px; }

  .metrics-table { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .metrics-table table { width:100%;border-collapse:collapse;font-size:13px; }
  .metrics-table th { background:var(--surface2);padding:10px 14px;text-align:left;font-weight:500;color:var(--text2);font-size:12px;border-bottom:0.5px solid var(--border); }
  .metrics-table td { padding:9px 14px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle; }
  .metrics-table tr:last-child td { border-bottom:none; }
  .metrics-table tr:hover td { background:var(--surface2); }
  .change-badge { display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500; }
  .up  { background:var(--green-bg);color:var(--green); }
  .down{ background:var(--red-bg);color:var(--red); }
  .neu { background:var(--surface2);color:var(--text3); }

  .creative-table { width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:0.5px solid var(--border);overflow:hidden; }
  .creative-table th { background:var(--surface2);padding:8px 12px;text-align:left;font-weight:500;color:var(--text3);font-size:11px;border-bottom:0.5px solid var(--border);white-space:nowrap; }
  .creative-table td { padding:8px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle; }
  .creative-table tr:last-child td { border-bottom:none; }
  .creative-table tr:hover td { background:var(--surface2); }
  .ad-name { font-weight:500;color:var(--text);max-width:220px;word-break:break-all;line-height:1.4; }
  .rec-badge { display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap; }
  .rec-kill  { background:#ffebee;color:#c62828; }
  .rec-recut { background:#fff3e0;color:#e65100; }
  .rec-keep  { background:#e8f5e9;color:#2e7d32; }
  .rec-boost { background:#e3f2fd;color:#1565c0; }
  .rec-watch { background:var(--surface2);color:var(--text2); }
  .spend-bar-wrap { width:60px;height:6px;background:var(--surface2);border-radius:3px;display:inline-block;vertical-align:middle; }
  .spend-bar { height:6px;border-radius:3px;background:#1877f2; }

  .period-toggle { display:flex;gap:6px;margin-bottom:12px; }
  .period-btn { padding:5px 14px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s; }
  .period-btn.active { background:#1877f2;color:#fff;border-color:#1877f2; }
  .period-btn:hover:not(.active) { background:var(--surface2); }
  .period-loading { padding:16px;text-align:center;color:var(--text2);font-size:13px; }

  .footer { text-align:center;padding:20px;font-size:12px;color:var(--text3); }

  @media (max-width:600px) {
    .day-compare { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns:repeat(2,1fr); }
    .top-bar h1 { font-size:15px; }
    .kpi-chips { gap:6px; }
    .kpi-chip { min-width:70px;padding:6px 10px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>📊 META 廣告數據儀表板</h1>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="date-badge" id="todayBadge">載入中...</span>
    <button class="refresh-btn" onclick="loadAllData()">↻ 重新整理</button>
  </div>
</div>

<div class="container">
  <div class="client-tabs">
    <button class="client-tab active" onclick="switchClient(0)">全國麗園</button>
    <button class="client-tab" onclick="switchClient(1)">如邑堂餅家</button>
  </div>
  <div class="client-panel active" id="panel-0">
    <div class="status-bar"><div class="status-dot loading" id="status-dot-0"></div><span id="status-text-0">資料載入中...</span></div>
    <div id="error-0"></div>
    <div id="content-0"></div>
  </div>
  <div class="client-panel" id="panel-1">
    <div class="status-bar"><div class="status-dot loading" id="status-dot-1"></div><span id="status-text-1">資料載入中...</span></div>
    <div id="error-1"></div>
    <div id="content-1"></div>
  </div>
</div>

<div class="footer">資料來源：META Marketing API｜每次重新整理抓取最新數據</div>

<script>
const TOKEN = 'EAAUPmHiPNZCsBRJY7XEOJ5LU8vw8SexDzZCo2HAZBVB5JWi0beS1bs8OULV4GuwaSnzt1czb0Ks8OYf7Vne66kJcqlaVKrVbyThMufl7LcrdEWlrc277utykZA63prxbRiJ7LW0Gk1bBxZBoEfIZA0ZCgzHKGgVfPArfxtccTU0jnTNkgRD513hXriVYgZDZD';

// ── 客戶設定 ──
const CLIENTS = [
  { name:'全國麗園',    accounts:['619361573660852'],                          cpa:{ good:500, ok:700  } },
  { name:'如邑堂餅家',  accounts:['633783697353799','1568525027410316'],        cpa:{ good:500, ok:650  } }
];

// ── 月目標（localStorage）──
function saveGoal(ci,field,val){try{localStorage.setItem('goal_'+ci+'_'+field,val);}catch(e){}}
function loadGoal(ci,field){try{return parseFloat(localStorage.getItem('goal_'+ci+'_'+field)||0);}catch(e){return 0;}}

const FIELDS = 'spend,impressions,clicks,ctr,reach,frequency,actions,action_values,cost_per_action_type,video_p25_watched_actions,video_p50_watched_actions,video_p100_watched_actions,video_play_actions,outbound_clicks';
const AD_FIELDS = 'ad_name,adset_name,campaign_name,spend,impressions,clicks,ctr,actions,action_values,cost_per_action_type,outbound_clicks';

function getDateRange() {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  const dayB = new Date(now); dayB.setDate(dayB.getDate()-2);
  return { today:fmt(yest), yesterday:fmt(dayB) };
}
function getExtendedDateRange(days) {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const end = new Date(now); end.setDate(end.getDate()-1);
  const start = new Date(now); start.setDate(start.getDate()-days);
  return { since:fmt(start), until:fmt(end) };
}

// ── 數值工具 ──
const gv  = (d,k) => { if(!d?.actions) return 0; const a=d.actions.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gcpa= (d,k) => { if(!d?.cost_per_action_type) return 0; const a=d.cost_per_action_type.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gacv= (d,k) => { if(!d?.action_values) return 0; const a=d.action_values.find(x=>x.action_type===k); return a?parseFloat(a.value):0; };
const gvid= (d,f) => { if(!d?.[f]) return 0; return d[f].reduce((s,x)=>s+parseFloat(x.value||0),0); };
const gob = (d)   => { if(!d?.outbound_clicks) return 0; return d.outbound_clicks.reduce((s,x)=>s+parseFloat(x.value||0),0); };
const adv = (ad,k)=> gv(ad,k);
const adcpa=(ad,k)=> gcpa(ad,k);
const adacv=(ad,k)=> gacv(ad,k);
const adob = (ad) => gob(ad);

function mergeInsights(arr) {
  if (!arr||arr.length===0) return null;
  const res = {};
  for (const k of ['spend','impressions','clicks','reach']) res[k]=arr.reduce((s,d)=>s+parseFloat(d[k]||0),0);
  res.ctr = res.impressions>0?res.clicks/res.impressions*100:0;
  const ma = (field) => {
    const c={};
    for (const d of arr) if(d[field]) for(const a of d[field]) c[a.action_type]=(c[a.action_type]||0)+parseFloat(a.value||0);
    return Object.entries(c).map(([action_type,value])=>({action_type,value:String(value)}));
  };
  res.actions=ma('actions'); res.action_values=ma('action_values');
  res.cost_per_action_type=[];
  for (const a of res.actions) { const v=parseFloat(a.value); if(v>0&&res.spend>0) res.cost_per_action_type.push({action_type:a.action_type,value:String((res.spend/v).toFixed(2))}); }
  for (const vf of ['video_p25_watched_actions','video_p50_watched_actions','video_p100_watched_actions','video_play_actions']) {
    const c={};
    for(const d of arr) if(d[vf]) for(const a of d[vf]) c[a.action_type||'v']=(c[a.action_type||'v']||0)+parseFloat(a.value||0);
    res[vf]=Object.entries(c).map(([action_type,value])=>({action_type,value:String(value)}));
  }
  const oc={};
  for(const d of arr) if(d.outbound_clicks) for(const a of d.outbound_clicks) oc[a.action_type||'l']=(oc[a.action_type||'l']||0)+parseFloat(a.value||0);
  res.outbound_clicks=Object.entries(oc).map(([action_type,value])=>({action_type,value:String(value)}));
  return res;
}

function normName(name) { if(!name) return '未命名'; return name.replace(/(\s*-\s*複本)+\s*$/g,'').trim(); }

function classType(camp, ci) {
  const t=(camp||'').toUpperCase();
  if(t.includes('素材')) return '__SKIP__';
  if(t.includes('互動')||t.includes('流量')||t.includes('觀看')) return '流量/互動/觀看';
  if(t.includes('ASC')) return 'ASC';
  if(ci===0){
    if(t.includes('KOL')) return 'KOL';
    if(t.includes('類似')) return '類似';
    if(t.includes('RT'))   return 'RT';
    if(t.includes('興趣')) return '興趣';
    return '其他';
  } else {
    if(t.includes('KOL')) return 'KOL';
    if((t.includes('台灣')||t.includes('TW'))&&t.includes('興趣')) return '台灣興趣';
    if((t.includes('海外')||t.includes('香港')||t.includes('HK')||t.includes('新加坡')||t.includes('西馬'))&&t.includes('興趣')) return '海外興趣';
    if(t.includes('類似')) return '類似';
    if((t.includes('台灣')||t.includes('TW'))&&t.includes('RT')) return '台灣RT';
    if((t.includes('海外')||t.includes('香港')||t.includes('HK')||t.includes('新加坡')||t.includes('西馬'))&&t.includes('RT')) return '海外RT';
    if(t.includes('興趣')) return '台灣興趣';
    if(t.includes('RT'))   return '台灣RT';
    return '其他';
  }
}

// ── 素材建議：CPA第一、購買量第二、ROAS第三 ──
function recommendAd(ad, ci) {
  const spend=parseFloat(ad.spend||0), cpa=adcpa(ad,'purchase'), roas=spend>0?adacv(ad,'purchase')/spend:0;
  const purchase=adv(ad,'purchase'), cart=adv(ad,'add_to_cart'), ctr=parseFloat(ad.ctr||0);
  const thr=CLIENTS[ci].cpa;

  if(spend<200) return {badge:'rec-watch',label:'觀察中',reason:`花費 NT$${Math.round(spend)}，資料不足，累積至 NT$300+ 再判斷`};

  if(purchase===0){
    if(spend>=600&&cart===0) return {badge:'rec-kill',label:'立即暫停',reason:`花費 NT$${Math.round(spend)} 零購買零加購，建議暫停`};
    if(cart>0) return {badge:'rec-recut',label:'優化落地頁',reason:`有 ${cart} 次加購但零購買，建議優化結帳流程`};
    return {badge:'rec-watch',label:'觀察中',reason:`花費 NT$${Math.round(spend)} 尚無購買，繼續觀察`};
  }

  // CPA 好
  if(cpa<thr.good){
    if(purchase>=10||roas>=4) return {badge:'rec-boost',label:'加大預算',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆 ROAS ${roas.toFixed(2)}x，明星素材建議加 20-30% 預算`};
    if(purchase>=5)           return {badge:'rec-boost',label:'加大預算',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆，建議加大預算放量`};
    return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（優秀✅）購買 ${purchase} 筆，維持現有預算`};
  }
  // CPA 普通
  if(cpa<thr.ok){
    if(purchase>=8&&roas>=3) return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（普通）購買 ${purchase} 筆 ROAS ${roas.toFixed(2)}x，整體表現不錯`};
    if(roas>=3)              return {badge:'rec-keep',label:'持續投放',reason:`CPA NT$${Math.round(cpa)}（普通）ROAS ${roas.toFixed(2)}x 達標，維持預算觀察`};
    return {badge:'rec-watch',label:'持續觀察',reason:`CPA NT$${Math.round(cpa)}（普通）購買 ${purchase} 筆，建議再觀察 2-3 天`};
  }
  // CPA 差
  if(purchase>=15&&roas>=3) return {badge:'rec-watch',label:'持續觀察',reason:`CPA NT$${Math.round(cpa)}（偏高）但購買量大（${purchase}筆）且 ROAS ${roas.toFixed(2)}x，縮預算繼續觀察`};
  if(roas<1.5)              return {badge:'rec-kill',label:'重新剪輯',reason:`CPA NT$${Math.round(cpa)}（差⚠️）ROAS ${roas.toFixed(2)}x 低於盈虧點，建議重新製作素材`};
  return {badge:'rec-recut',label:'調整素材',reason:`CPA NT$${Math.round(cpa)}（差⚠️）購買 ${purchase} 筆，建議調整素材訴求`};
}

// ── API ──
async function fetchInsights(accountId, s, e) {
  const url=`https://graph.facebook.com/v19.0/act_${accountId}/insights?fields=${FIELDS}&time_range={"since":"${s}","until":"${e}"}&level=account&access_token=${TOKEN}`;
  const res=await fetch(url); const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.data?.length>0?data.data[0]:null;
}
async function fetchAdInsights(accountId, s, e) {
  const end=e||s; let all=[];
  let url=`https://graph.facebook.com/v19.0/act_${accountId}/insights?fields=${AD_FIELDS}&time_range={"since":"${s}","until":"${end}"}&level=ad&limit=200&access_token=${TOKEN}`;
  let pg=0;
  while(url&&pg<5){
    const res=await fetch(url); const data=await res.json();
    if(data.error) throw new Error(data.error.message+'(code:'+data.error.code+')');
    if(data.data) all=all.concat(data.data);
    url=data.paging?.next||null; pg++;
  }
  return all;
}
async function fetchClientData(ci) {
  const client=CLIENTS[ci]; const{today,yesterday}=getDateRange();
  const now=new Date(); const m1=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const res={today:[],yesterday:[],adsToday:[],adsYesterday:[],monthTotal:[],adsPrev:[],ads14d:[]};
  const r14=getExtendedDateRange(14);
  for(const acc of client.accounts){
    const[t,y,at,ay,mo,ap,a14]=await Promise.all([
      fetchInsights(acc,today,today).catch(()=>null),
      fetchInsights(acc,yesterday,yesterday).catch(()=>null),
      fetchAdInsights(acc,today).catch(()=>[]),
      fetchAdInsights(acc,yesterday).catch(()=>[]),
      fetchInsights(acc,m1,today).catch(()=>null),
      fetchAdInsights(acc,yesterday).catch(()=>[]),
      fetchAdInsights(acc,r14.since,r14.until).catch(()=>[])
    ]);
    if(t)res.today.push(t); if(y)res.yesterday.push(y); if(mo)res.monthTotal.push(mo);
    res.adsToday=res.adsToday.concat(at||[]);
    res.adsYesterday=res.adsYesterday.concat(ay||[]);
    res.adsPrev=res.adsPrev.concat(ap||[]);
    res.ads14d=(res.ads14d||[]).concat(a14||[]);
  }
  // 廣告組數：排除 ASC、RT、流量/互動/觀看，只計算進行中（有花費）的興趣/KOL/類似受眾廣告組
  const uniqAdsets=(ads)=>new Set(
    ads.filter(a=>{
      if(parseFloat(a.spend||0)<=0) return false;
      const camp=(a.campaign_name||'').toUpperCase();
      if(camp.includes('ASC')) return false;
      if(camp.includes('RT')) return false;
      if(camp.includes('互動')||camp.includes('流量')||camp.includes('觀看')) return false;
      const aset=(a.adset_name||'').toUpperCase();
      if(aset.includes('RT')) return false;
      return true;
    }).map(a=>(a.adset_name||a.ad_name||'').trim())
    .filter(n=>n.length>0)
  ).size;
  return{
    today:mergeInsights(res.today), yesterday:mergeInsights(res.yesterday),
    adsToday:res.adsToday, adsYesterday:res.adsYesterday,
    monthTotal:mergeInsights(res.monthTotal),
    adsetCountToday:uniqAdsets(res.adsToday),
    adsetCountYesterday:uniqAdsets(res.adsPrev),
    ads14d:res.ads14d
  };
}

// ── 格式 ──
function fmt(n,type='num'){
  if(n===null||n===undefined||isNaN(n))return'-';
  if(type==='money')return'NT$'+Math.round(n).toLocaleString();
  if(type==='pct')return n.toFixed(2)+'%';
  if(type==='x')return n.toFixed(2)+'x';
  return Math.round(n).toLocaleString();
}
function chgBadge(a,b,lb=false){
  if(!b||b===0)return'';
  const p=(a-b)/b*100,good=lb?p<0:p>0;
  const cls=Math.abs(p)<1?'neu':good?'up':'down';
  return`<span class="change-badge ${cls}">${p>0?'+':''}${p.toFixed(1)}%</span>`;
}
function row2(top,bot){return`${top}<br><small style="color:var(--text3)">${bot}</small>`;}
const rc=(r)=>r>=3?'var(--green)':r>=2?'var(--amber)':r>0?'var(--red)':'var(--text3)';
const fM=(n)=>n>0?'NT$'+Math.round(n).toLocaleString():'-';
const fX=(n)=>n>0?n.toFixed(2)+'x':'-';
const fP=(n)=>n>0?n.toFixed(1)+'%':'-';
const cpaCl=(cpa,ci)=>{ const t=CLIENTS[ci].cpa; return cpa<=0?'var(--text3)':cpa<t.good?'var(--green)':cpa<t.ok?'var(--amber)':'var(--red)'; };

// ── 合併 ads by name ──
function mergeAdsByName(rawAds, ci) {
  const map={};
  for(const ad of rawAds){
    if(parseFloat(ad.spend||0)<=0) continue;
    const type=classType(ad.campaign_name,ci);
    if(type==='__SKIP__') continue;
    const key=normName(ad.ad_name);
    if(!map[key]){
      map[key]=JSON.parse(JSON.stringify(ad));
      map[key].ad_name=key; map[key]._campaign=ad.campaign_name; map[key]._type=type;
    } else {
      const base=map[key];
      base.spend=String(parseFloat(base.spend||0)+parseFloat(ad.spend||0));
      base.impressions=String(parseInt(base.impressions||0)+parseInt(ad.impressions||0));
      base.clicks=String(parseInt(base.clicks||0)+parseInt(ad.clicks||0));
      const mArr=(f)=>{
        if(!ad[f])return; if(!base[f]){base[f]=JSON.parse(JSON.stringify(ad[f]));return;}
        for(const item of ad[f]){const ex=base[f].find(x=>x.action_type===item.action_type);if(ex)ex.value=String(parseFloat(ex.value||0)+parseFloat(item.value||0));else base[f].push(JSON.parse(JSON.stringify(item)));}
      };
      mArr('actions');mArr('action_values');mArr('outbound_clicks');
      const imp=parseInt(base.impressions||0),clk=parseInt(base.clicks||0);
      base.ctr=imp>0?String((clk/imp*100).toFixed(4)):'0';
      const sp=parseFloat(base.spend||0); base.cost_per_action_type=[];
      if(base.actions)for(const a of base.actions){const v=parseFloat(a.value||0);if(v>0&&sp>0)base.cost_per_action_type.push({action_type:a.action_type,value:String((sp/v).toFixed(2))});}
    }
  }
  return Object.values(map);
}

function sumType(rawAds, type, ci){
  let s=0,p=0,a=0,c=0;
  for(const ad of rawAds){
    if(parseFloat(ad.spend||0)<=0)continue;
    if(classType(ad.campaign_name,ci)!==type)continue;
    s+=parseFloat(ad.spend||0); p+=adv(ad,'purchase'); a+=adacv(ad,'purchase'); c+=adv(ad,'add_to_cart');
  }
  return{spend:s,purchase:p,acv:a,cart:c,cpa:p>0?s/p:0,roas:s>0?a/s:0};
}

// ────────────────────────────────────────────────
// ── 日報產生器 ──
// ────────────────────────────────────────────────
function buildDailyReport(ci, todayData, adsToday, extra={}) {
  const{today}=getDateRange(); const client=CLIENTS[ci]; const thr=client.cpa;
  const spend=parseFloat(todayData?.spend||0);
  if(!spend) return '<div class="report-loading">⏳ 昨天尚無花費數據</div>';

  const purchase=gv(todayData,'purchase'), cpa=gcpa(todayData,'purchase');
  const acv=gacv(todayData,'purchase'), roas=spend>0?acv/spend:0;
  const ctr=parseFloat(todayData?.ctr||0);
  const convRate=todayData?.clicks>0?purchase/todayData.clicks*100:0;

  // 月累計
  const mo=extra.monthTotal||null;
  const moPurchase=mo?gv(mo,'purchase'):0;
  const moAcv=mo?gacv(mo,'purchase'):0;
  const moSpend=mo?parseFloat(mo.spend||0):0;
  const goalOrders=loadGoal(ci,'orders');
  const goalRev=loadGoal(ci,'revenue');
  const nowDate=new Date(); const daysInMonth=new Date(nowDate.getFullYear(),nowDate.getMonth()+1,0).getDate();
  const dayOfMonth=nowDate.getDate()-1; // 昨天是幾號
  const daysLeft=daysInMonth-dayOfMonth;
  const needOrders=goalOrders>0?Math.max(0,goalOrders-moPurchase):0;
  const achRate=goalOrders>0?(moPurchase/goalOrders*100):0;
  const dailyAvg=dayOfMonth>0?moPurchase/dayOfMonth:0;

  // 廣告組數
  const adsetToday=extra.adsetCountToday||0;
  const adsetYest=extra.adsetCountYesterday||0;
  const adsetDiff=adsetToday-adsetYest;

  const typeOrder = ci===0
    ? ['流量/互動/觀看','ASC','KOL','興趣','類似','RT','其他']
    : ['流量/互動/觀看','ASC','KOL','台灣興趣','海外興趣','類似','台灣RT','海外RT','其他'];
  const typeData={};
  for(const t of typeOrder) typeData[t]=sumType(adsToday,t,ci);

  // 表現分類
  const bestList=[], warnList=[], zeroList=[], highBudgetLowROAS=[];
  const totalSpend=Object.values(typeData).reduce((s,d)=>s+d.spend,0)||1;
  for(const t of typeOrder){
    const d=typeData[t]; if(d.spend<100)continue;
    if(d.purchase===0&&d.spend>=400) zeroList.push({type:t,spend:d.spend,pct:(d.spend/totalSpend*100)});
    else if(d.cpa>0&&d.cpa<thr.good) bestList.push({type:t,...d,pct:(d.spend/totalSpend*100)});
    else if(d.cpa>=thr.ok&&d.purchase>0) warnList.push({type:t,...d,pct:(d.spend/totalSpend*100)});
    if(d.spend/totalSpend>0.3&&d.roas>0&&d.roas<2) highBudgetLowROAS.push({type:t,...d,pct:(d.spend/totalSpend*100)});
  }
  bestList.sort((a,b)=>a.cpa-b.cpa);
  warnList.sort((a,b)=>b.spend-a.spend);

  // 素材
  const adList=mergeAdsByName(adsToday,ci).filter(ad=>adv(ad,'purchase')>0).sort((a,b)=>parseFloat(b.spend||0)-parseFloat(a.spend||0));
  const badAds=mergeAdsByName(adsToday,ci).filter(ad=>adcpa(ad,'purchase')>=thr.ok&&adv(ad,'purchase')>0).sort((a,b)=>adcpa(b,'purchase')-adcpa(a,'purchase'));

  // ── 口述段落 ──
  const cpaTag=cpa<thr.good?`<strong style="color:var(--green)">NT$${Math.round(cpa)}（優秀✅）</strong>`:cpa<thr.ok?`<strong style="color:var(--amber)">NT$${Math.round(cpa)}（普通）</strong>`:`<strong style="color:var(--red)">NT$${Math.round(cpa)}（偏高⚠️）</strong>`;
  const roasTag=roas>=3?`<strong style="color:var(--green)">${roas.toFixed(2)}x（達標✅）</strong>`:roas>=2?`<strong style="color:var(--amber)">${roas.toFixed(2)}x（普通）</strong>`:`<strong style="color:var(--red)">${roas.toFixed(2)}x（偏低⚠️）</strong>`;

  // P1 昨日整體
  let p1=`昨天（${today}）共跑了 <strong>${purchase}</strong> 單，廣告費 <strong>NT$${Math.round(spend).toLocaleString()}</strong>，CPA ${cpaTag}，ROAS ${roasTag}，轉換率 <strong>${convRate.toFixed(2)}%</strong>。`;

  // P2 月累計
  let p2='';
  if(goalOrders>0||moPurchase>0){
    const achStr=goalOrders>0?`達成率約 <strong>${achRate.toFixed(0)}%</strong>，`:'';
    const moRevStr=goalRev>0?`、營業額 <strong>NT$${Math.round(moAcv).toLocaleString()}</strong>`:'';
    p2=`月累計目前 <strong>${moPurchase}</strong> 單${moRevStr}，${achStr}`;
    if(goalOrders>0&&daysLeft>0){
      const onTrack=dailyAvg*daysLeft+moPurchase>=goalOrders*0.95;
      p2+=`剩 ${daysLeft} 天還需要 <strong>${needOrders}</strong> 單，以目前日均約 ${dailyAvg.toFixed(0)} 單的速度<strong>${onTrack?'追得上✅':'有點吃力⚠️'}</strong>。`;
    }
  }

  // P3 受眾分組（對照口述範本）
  let p3='';
  const totalTypeSpend=Object.values(typeData).reduce((s,d)=>s+d.spend,0)||1;

  // 亮眼受眾：CPA好且預算偏低 → 建議加碼
  if(bestList.length>0){
    const boostItems=bestList.filter(b=>b.pct<15); // 佔比低的亮眼受眾
    const goodItems=bestList.filter(b=>b.pct>=15);
    if(boostItems.length>0){
      const s=boostItems.map(b=>`<strong>${b.type}</strong>（CPA NT$${Math.round(b.cpa)}、ROAS ${b.roas.toFixed(2)}x）`).join('、');
      const spendSum=boostItems.reduce((a,b)=>a+b.spend,0);
      p3+=`受眾表現最亮眼的是 ${s}，但這${boostItems.length>1?boostItems.length+'組':'組'}預算加起來才 NT$${Math.round(spendSum).toLocaleString()}，比例偏低，建議各拉高到 NT$1,500 左右放量。`;
    } else if(goodItems.length>0){
      const s=goodItems.slice(0,2).map(b=>`<strong>${b.type}</strong>（CPA NT$${Math.round(b.cpa)}、ROAS ${b.roas.toFixed(2)}x，佔比 ${b.pct.toFixed(0)}%）`).join('、');
      p3+=`受眾表現最亮眼的是 ${s}，建議維持甚至加碼。`;
    }
  }

  // 高費低效：佔比高但 CPA 差 → 找出零購買廣告組名稱
  if(highBudgetLowROAS.length>0||zeroList.length>0){
    const bigType=highBudgetLowROAS.length>0?highBudgetLowROAS[0]:(warnList.length>0?warnList[0]:null);
    if(bigType){
      p3+=`<br><br><strong>${bigType.type}</strong> 昨天花了 NT$${Math.round(bigType.spend).toLocaleString()}，佔整體 ${bigType.pct.toFixed(0)}%，但 CPA NT$${Math.round(bigType.cpa)}、ROAS ${bigType.roas.toFixed(2)}x，效率偏差。`;
      // 找出該類型裡零購買的廣告組
      const zeroAdsets=adsToday.filter(ad=>{
        if(parseFloat(ad.spend||0)<200) return false;
        if(classType(ad.campaign_name,ci)!==bigType.type) return false;
        const p=adv(ad,'purchase');
        return p===0;
      });
      const zeroNames=[...new Set(zeroAdsets.map(a=>{
        // 取廣告組名稱中有意義的部分（去掉日期編號）
        const name=(a.adset_name||a.ad_name||'');
        return name.replace(/[-_]\d{4,}$/,'').replace(/\s*-\s*0\d{3,}$/,'').trim();
      }))].slice(0,5);
      const zeroTotal=zeroAdsets.reduce((s,a)=>s+parseFloat(a.spend||0),0);
      if(zeroNames.length>0){
        p3+=`裡面有 ${zeroNames.length} 個廣告組花了將近 NT$${Math.round(zeroTotal).toLocaleString()} 但一單都沒出，分別是${zeroNames.map(n=>`【${n}】`).join('、')}，建議今天直接暫停，把預算集中給表現好的組合。`;
      } else {
        p3+=`建議進後台確認素材組成，暫停低效廣告組。`;
      }
    }
    // 其他零購買類型
    const otherZero=zeroList.filter(z=>!highBudgetLowROAS.find(h=>h.type===z.type));
    if(otherZero.length>0){
      const names=otherZero.map(z=>`${z.type}（NT$${Math.round(z.spend).toLocaleString()}）`).join('、');
      p3+=`<br><br>另外 ${names} 也是零購買，建議一併暫停。`;
    }
  } else if(zeroList.length>0){
    const zTotal=zeroList.reduce((s,z)=>s+z.spend,0);
    const names=zeroList.map(z=>`${z.type}（NT$${Math.round(z.spend).toLocaleString()}）`).join('、');
    p3+=`<br><br>⚠️ ${names} 有花費但零購買，合計燒掉 NT$${Math.round(zTotal).toLocaleString()}，建議今天直接暫停。`;
  }

  // 最佳廣告組合點名
  const bestAdsets=adsToday.filter(ad=>parseFloat(ad.spend||0)>200&&adv(ad,'purchase')>0)
    .map(ad=>({
      name:(ad.adset_name||ad.ad_name||''),
      spend:parseFloat(ad.spend||0),
      cpa:adcpa(ad,'purchase'),
      roas:parseFloat(ad.spend||0)>0?adacv(ad,'purchase')/parseFloat(ad.spend||0):0,
      purchase:adv(ad,'purchase')
    }))
    .filter(a=>a.cpa>0&&a.cpa<thr.ok)
    .sort((a,b)=>a.cpa-b.cpa)
    .slice(0,2);
  if(bestAdsets.length>0){
    const bStr=bestAdsets.map(a=>{
      const n=a.name;
      return `【${n}】CPA NT$${Math.round(a.cpa)}、ROAS ${a.roas.toFixed(2)}x`;
    }).join('，以及 ');
    p3+=`<br><br>昨天表現最好的廣告組合是 ${bStr}，這${bestAdsets.length>1?'兩':''}組今天建議維持甚至加碼。`;
  }

  // P4 素材（加碼 + 暫停兩個方向）
  let p4='';
  // 加碼素材：CPA好且有購買
  const boostAds=mergeAdsByName(adsToday,ci)
    .filter(ad=>adv(ad,'purchase')>0&&adcpa(ad,'purchase')>0&&adcpa(ad,'purchase')<thr.good)
    .sort((a,b)=>adcpa(a,'purchase')-adcpa(b,'purchase'))
    .slice(0,3);
  // 暫停素材：ROAS極低
  const killAds=mergeAdsByName(adsToday,ci)
    .filter(ad=>{
      const sp=parseFloat(ad.spend||0); if(sp<300)return false;
      const r=sp>0?adacv(ad,'purchase')/sp:0;
      return r>0&&r<1.5;
    })
    .sort((a,b)=>{
      const ra=parseFloat(a.spend||0)>0?adacv(a,'purchase')/parseFloat(a.spend||0):0;
      const rb=parseFloat(b.spend||0)>0?adacv(b,'purchase')/parseFloat(b.spend||0):0;
      return ra-rb;
    })
    .slice(0,2);

  if(boostAds.length>0){
    const bStr=boostAds.map(ad=>{
      const n=(ad.ad_name||'').length>18?(ad.ad_name||'').slice(0,18)+'…':(ad.ad_name||'');
      const r=parseFloat(ad.spend||0)>0?adacv(ad,'purchase')/parseFloat(ad.spend||0):0;
      return `【${n}】CPA NT$${Math.round(adcpa(ad,'purchase'))}、ROAS ${r.toFixed(2)}x`;
    }).join('，');
    p4+=`素材這邊，昨天 CPA 最漂亮的是 ${bStr}，建議各加預算 20-30% 放量。`;
  } else if(adList.length>0){
    // fallback：花費最高
    const top=adList[0];
    const tc=adcpa(top,'purchase'),tr=parseFloat(top.spend||0)>0?adacv(top,'purchase')/parseFloat(top.spend||0):0;
    const tn=(top.ad_name||'').length>22?(top.ad_name||'').slice(0,22)+'…':(top.ad_name||'');
    p4+=`花費最高素材是【${tn}】，CPA NT$${Math.round(tc)}、ROAS ${tr.toFixed(2)}x。`;
  }
  if(killAds.length>0){
    const kStr=killAds.map(ad=>{
      const n=(ad.ad_name||'').length>18?(ad.ad_name||'').slice(0,18)+'…':(ad.ad_name||'');
      const r=parseFloat(ad.spend||0)>0?adacv(ad,'purchase')/parseFloat(ad.spend||0):0;
      return `【${n}】ROAS ${r.toFixed(2)}x`;
    }).join('、');
    p4+=`<br><br>反過來，${kStr} 已經在虧錢，建議這週直接暫停，預算挪給表現好的素材。`;
  }

  // P5 廣告組數 + 整體方向
  let p5='';
  if(adsetToday>0||adsetYest>0){
    const diffStr=adsetDiff>0?`新增 ${adsetDiff} 組，`:adsetDiff<0?`減少 ${Math.abs(adsetDiff)} 組，`:'組數不變，';
    p5+=`廣告組數從前天 <strong>${adsetYest}</strong> 組變為昨天 <strong>${adsetToday}</strong> 組，${diffStr}目前持續監控中。`;
  }
  const hasIssue=zeroList.length>0||highBudgetLowROAS.length>0||killAds.length>0;
  if(hasIssue){
    const actions=[];
    if(zeroList.length>0||highBudgetLowROAS.length>0){
      const badTypes=[...new Set([...zeroList.map(z=>z.type),...highBudgetLowROAS.map(h=>h.type)])];
      actions.push(`把預算從${badTypes.join('、')}的低效廣告組抽出來`);
    }
    if(killAds.length>0) actions.push(`暫停 ROAS 低於 1.5x 的素材`);
    if(bestAdsets.length>0) actions.push(`集中給${bestAdsets.slice(0,2).map(a=>{const n=a.name.length>12?a.name.slice(0,12)+'…':a.name;return '【'+n+'】';}).join('、')}等高效組合`);
    const dailyTarget=goalOrders>0&&daysLeft>0?Math.ceil(needOrders/daysLeft):0;
    p5+=`<br><br>整體方向就是${actions.join('，')}，${dailyTarget>0?`目標月底前把日均單數維持在 <strong>${dailyTarget}</strong> 單以上就能達標。`:'持續優化效率。'}`;
  }

  // P6 近14天素材亮點
  let p6='';
  const ads14d=extra.ads14d||[];
  if(ads14d.length>0){
    // 合併14天素材
    const map14={};
    for(const ad of ads14d){
      if(parseFloat(ad.spend||0)<=0)continue;
      const type=classType(ad.campaign_name,ci);
      if(type==='__SKIP__')continue;
      const key=normName(ad.ad_name);
      if(!map14[key]){
        map14[key]=JSON.parse(JSON.stringify(ad));
        map14[key].ad_name=key; map14[key]._type=type;
      } else {
        const base=map14[key];
        base.spend=String(parseFloat(base.spend||0)+parseFloat(ad.spend||0));
        const mArr=(f)=>{
          if(!ad[f])return; if(!base[f]){base[f]=JSON.parse(JSON.stringify(ad[f]));return;}
          for(const item of ad[f]){const ex=base[f].find(x=>x.action_type===item.action_type);if(ex)ex.value=String(parseFloat(ex.value||0)+parseFloat(item.value||0));else base[f].push(JSON.parse(JSON.stringify(item)));}
        };
        mArr('actions');mArr('action_values');
        const sp=parseFloat(base.spend||0); base.cost_per_action_type=[];
        if(base.actions)for(const a of base.actions){const v=parseFloat(a.value||0);if(v>0&&sp>0)base.cost_per_action_type.push({action_type:a.action_type,value:String((sp/v).toFixed(2))});}
      }
    }
    const adList14=Object.values(map14)
      .filter(ad=>adv(ad,'purchase')>0)
      .map(ad=>({
        ...ad,
        _cpa:adcpa(ad,'purchase'),
        _roas:parseFloat(ad.spend||0)>0?adacv(ad,'purchase')/parseFloat(ad.spend||0):0,
        _purchase:adv(ad,'purchase')
      }))
      .sort((a,b)=>parseFloat(b.spend||0)-parseFloat(a.spend||0));

    // 分類：好素材 & 差素材
    const good14=adList14.filter(a=>a._cpa>0&&a._cpa<thr.good).sort((a,b)=>a._cpa-b._cpa).slice(0,3);
    const bad14=adList14.filter(a=>a._roas>0&&a._roas<1.5&&parseFloat(a.spend||0)>500).sort((a,b)=>a._roas-b._roas).slice(0,2);

    if(good14.length>0){
      const gStr=good14.map(a=>`【${a.ad_name}】CPA NT$${Math.round(a._cpa)}、ROAS ${a._roas.toFixed(2)}x`).join('，');
      p6+=`近14天表現最好的素材：${gStr}，這${good14.length>1?good14.length+'支':'支'}建議各加預算 20-30% 放量。`;
    }
    if(bad14.length>0){
      const bStr=bad14.map(a=>`【${a.ad_name}】ROAS ${a._roas.toFixed(2)}x`).join('、');

  return `

      <div class="report-section-title">📊 昨日關鍵數字</div>
      <div class="kpi-chips">
        <div class="kpi-chip"><div class="kpi-chip-label">購買單數</div><div class="kpi-chip-value">${purchase}</div></div>
        <div class="kpi-chip"><div class="kpi-chip-label">廣告費</div><div class="kpi-chip-value" style="font-size:14px">NT$${Math.round(spend).toLocaleString()}</div></div>
        <div class="kpi-chip"><div class="kpi-chip-label">CPA ★</div><div class="kpi-chip-value" style="font-size:14px;color:${cpaCl(cpa,ci)}">NT$${Math.round(cpa)}</div></div>
        <div class="kpi-chip"><div class="kpi-chip-label">ROAS</div><div class="kpi-chip-value" style="color:${rc(roas)}">${roas.toFixed(2)}x</div></div>
        <div class="kpi-chip"><div class="kpi-chip-label">轉換率</div><div class="kpi-chip-value">${convRate.toFixed(2)}%</div></div>
        <div class="kpi-chip"><div class="kpi-chip-label">CTR</div><div class="kpi-chip-value">${ctr.toFixed(2)}%</div></div>

        ${adsetToday>0?`<div class="kpi-chip"><div class="kpi-chip-label">廣告組數</div><div class="kpi-chip-value">${adsetYest}<span style="font-size:12px;color:${adsetDiff>0?'var(--green)':adsetDiff<0?'var(--red)':'var(--text3)'}"> → ${adsetToday}</span></div></div>`:''}

function buildCreativeSummary(ci, adsToday, adsYesterday){
  const{today:d1,yesterday:d2}=getDateRange();
  const typeOrder=ci===0?['流量/互動/觀看','ASC','KOL','興趣','類似','RT','其他']:['流量/互動/觀看','ASC','KOL','台灣興趣','海外興趣','類似','台灣RT','海外RT','其他'];
  const typeColor={'ASC':'#1565c0','KOL':'#6a1b9a','台灣興趣':'#e65100','海外興趣':'#bf360c','類似':'#2e7d32','台灣RT':'#c62828','海外RT':'#ad1457','RT':'#c62828','興趣':'#e65100','流量/互動/觀看':'#37474f','其他':'#546e7a'};

  let grandT={spend:0,purchase:0,acv:0},grandY={spend:0,purchase:0,acv:0};
  const allTypes=typeOrder.filter(t=>{
    const st=sumType(adsToday,t,ci),sy=sumType(adsYesterday,t,ci);
    if(st.spend>0){grandT.spend+=st.spend;grandT.purchase+=st.purchase;grandT.acv+=st.acv;}
    if(sy.spend>0){grandY.spend+=sy.spend;grandY.purchase+=sy.purchase;grandY.acv+=sy.acv;}
    return st.spend>0||sy.spend>0;
  });

  let rows='';
  for(const typeName of allTypes){
    const st=sumType(adsToday,typeName,ci),sy=sumType(adsYesterday,typeName,ci);
    const color=typeColor[typeName]||'#546e7a';
    const pctT=grandT.spend>0?st.spend/grandT.spend*100:0;
    const pctY=grandY.spend>0?sy.spend/grandY.spend*100:0;
    rows+=`<tr>
      <td style="padding:9px 14px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px"></span><b>${typeName}</b></td>
      <td style="padding:9px 14px;text-align:right">${fM(st.spend)}<br><small style="color:var(--text3)">${fM(sy.spend)}</small><br>${chgBadge(st.spend,sy.spend,false)}</td>
      <td style="padding:9px 14px;text-align:right">${row2(fP(pctT),fP(pctY))}</td>
      <td style="padding:9px 14px;text-align:right">${row2(st.purchase>0?st.purchase:'-',sy.purchase>0?sy.purchase:'-')}</td>
      <td style="padding:9px 14px;text-align:right"><span style="color:${cpaCl(st.cpa,ci)};font-weight:700">${fM(st.cpa)}</span><br><small style="color:var(--text3)">${fM(sy.cpa)}</small><br>${chgBadge(st.cpa,sy.cpa,true)}</td>
      <td style="padding:9px 14px;text-align:right;font-weight:600"><span style="color:${rc(st.roas)}">${fX(st.roas)}</span><br><small style="color:${rc(sy.roas)}">${fX(sy.roas)}</small></td>
    </tr>`;
  }

  const gTR=grandT.spend>0?grandT.acv/grandT.spend:0,gYR=grandY.spend>0?grandY.acv/grandY.spend:0;
  const gTC=grandT.purchase>0?grandT.spend/grandT.purchase:0,gYC=grandY.purchase>0?grandY.spend/grandY.purchase:0;

  return`<div style="font-size:11px;color:var(--text3);margin-bottom:6px">上排 = 昨天（${d1}）｜下排灰色 = 前天（${d2}）</div>
    <div class="metrics-table" style="margin-bottom:16px">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--surface2)">
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2)">類型</th>
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);text-align:right">花費</th>
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);text-align:right">佔比</th>
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);text-align:right">購買</th>
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);text-align:right">CPA ★</th>
          <th style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);text-align:right">ROAS</th>
        </tr></thead>
        <tbody style="background:var(--surface)">
          ${rows}
          <tr style="background:var(--surface2);font-weight:600;border-top:1.5px solid var(--border2)">
            <td style="padding:10px 14px">總計</td>
            <td style="padding:10px 14px;text-align:right">${fM(grandT.spend)}<br><small style="color:var(--text3)">${fM(grandY.spend)}</small><br>${chgBadge(grandT.spend,grandY.spend)}</td>
            <td style="padding:10px 14px;text-align:right">100%</td>
            <td style="padding:10px 14px;text-align:right">${grandT.purchase>0?grandT.purchase:'-'}<br><small style="color:var(--text3)">${grandY.purchase>0?grandY.purchase:'-'}</small></td>
            <td style="padding:10px 14px;text-align:right"><span style="color:${cpaCl(gTC,ci)};font-weight:700">${fM(gTC)}</span><br><small style="color:var(--text3)">${fM(gYC)}</small><br>${chgBadge(gTC,gYC,true)}</td>
            <td style="padding:10px 14px;text-align:right;font-weight:600"><span style="color:${rc(gTR)}">${fX(gTR)}</span><br><small style="color:${rc(gYR)}">${fX(gYR)}</small></td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

const _periodCache={};

async function loadDetailPeriod(ci,period){
  const el=document.getElementById('creative-'+ci);
  document.querySelectorAll(`.period-btn[data-client="${ci}"]`).forEach(b=>b.classList.toggle('active',b.dataset.period===period));
  if(_periodCache[ci+'_'+period]){renderFlatTable(ci,_periodCache[ci+'_'+period],period);return;}
  el.innerHTML=`<div class="period-loading">⏳ 載入${period==='7d'?'近7天':period==='14d'?'近14天':period==='30d'?'近30天':'昨天'}數據...</div>`;
  try{
    let since,until;
    if(period==='7d'){const r=getExtendedDateRange(7);since=r.since;until=r.until;}
    else if(period==='14d'){const r=getExtendedDateRange(14);since=r.since;until=r.until;}
    else if(period==='30d'){const r=getExtendedDateRange(30);since=r.since;until=r.until;}
    else{const{today}=getDateRange();since=today;until=today;}
    let all=[];
    for(const acc of CLIENTS[ci].accounts){const ads=await fetchAdInsights(acc,since,until);all=all.concat(ads);}
    _periodCache[ci+'_'+period]=all; renderFlatTable(ci,all,period);
  }catch(e){el.innerHTML=`<div class="period-loading" style="color:var(--red)">⚠️ 載入失敗：${e.message}</div>`;}
}

function renderFlatTable(ci, rawAds, period){
  const el=document.getElementById('creative-'+ci);
  const{today:d1}=getDateRange();
  const typeColor={'ASC':'#1565c0','KOL':'#6a1b9a','台灣興趣':'#e65100','海外興趣':'#bf360c','類似':'#2e7d32','台灣RT':'#c62828','海外RT':'#ad1457','RT':'#c62828','興趣':'#e65100','流量/互動/觀看':'#37474f','其他':'#546e7a'};

  const classifiedAds=mergeAdsByName(rawAds,ci)
    .map(ad=>({...ad,_type:classType(ad._campaign||ad.campaign_name,ci)}))
    .filter(ad=>ad._type!=='__SKIP__')
    .sort((a,b)=>parseFloat(b.spend||0)-parseFloat(a.spend||0));

  if(classifiedAds.length===0){el.innerHTML='<div class="period-loading" style="color:var(--text3)">此期間無廣告花費</div>';return;}

  const globalMax=Math.max(...classifiedAds.map(a=>parseFloat(a.spend||0)),1);
  let periodLabel=period==='7d'?`近7天（${getExtendedDateRange(7).since} ～ ${getExtendedDateRange(7).until}）`
    :period==='14d'?`近14天（${getExtendedDateRange(14).since} ～ ${getExtendedDateRange(14).until}）`
    :period==='30d'?`近30天（${getExtendedDateRange(30).since} ～ ${getExtendedDateRange(30).until}）`
    :`昨天（${d1}）`;

  let rows='';
  for(const ad of classifiedAds){
    const color=typeColor[ad._type]||'#546e7a';
    const spend=parseFloat(ad.spend||0),ctr=parseFloat(ad.ctr||0);
    const cart=adv(ad,'add_to_cart'),purchase=adv(ad,'purchase');
    const cpa=adcpa(ad,'purchase'),roas=spend>0?adacv(ad,'purchase')/spend:0;
    const rec=recommendAd(ad,ci);
    const barW=Math.round(spend/globalMax*60);
    const dispName=(ad.ad_name||'').length>38?(ad.ad_name||'').slice(0,38)+'…':(ad.ad_name||'未命名');
    rows+=`<tr>
      <td style="padding:8px 12px">
        <div class="ad-name" title="${(ad.ad_name||'').replace(/</g,'&lt;')}">${dispName}</div>
      </td>
      <td style="padding:8px 12px;text-align:right">NT$${Math.round(spend).toLocaleString()}<br><div class="spend-bar-wrap"><div class="spend-bar" style="width:${barW}px"></div></div></td>
      <td style="padding:8px 12px;text-align:right">${ctr>0?ctr.toFixed(2)+'%':'-'}</td>
      <td style="padding:8px 12px;text-align:right">${cart>0?cart:'-'}</td>
      <td style="padding:8px 12px;text-align:right">${purchase>0?purchase:'-'}</td>
      <td style="padding:8px 12px;text-align:right;font-weight:700"><span style="color:${cpaCl(cpa,ci)}">${fM(cpa)}</span></td>
      <td style="padding:8px 12px;text-align:right;font-weight:600;color:${rc(roas)}">${fX(roas)}</td>
      <td style="padding:8px 12px"><span class="rec-badge ${rec.badge}">${rec.label}</span></td>
      <td style="padding:8px 12px;font-size:11px;color:var(--text2);max-width:160px;line-height:1.4">${rec.reason}</td>
    </tr>`;
  }

  el.innerHTML=`
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">統計區間：${periodLabel}｜共 ${classifiedAds.length} 組素材｜依花費排序｜CPA 顏色：綠=優秀 橘=普通 紅=差</div>
    <div class="metrics-table">
      <table class="creative-table">
        <thead><tr>
          <th>廣告名稱</th>
          <th style="text-align:right">花費</th>
          <th style="text-align:right">CTR</th>
          <th style="text-align:right">加購</th>
          <th style="text-align:right">購買</th>
          <th style="text-align:right">CPA ★</th>
          <th style="text-align:right">ROAS</th>
          <th>建議</th><th>原因</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">ROAS</div><div class="kpi-value">${fmt(rt,'x')}</div></div>
        <div class="kpi"><div class="kpi-label">CTR</div><div class="kpi-value">${fmt(t?.ctr,'pct')}</div></div>
      </div>
    </div>
    <div class="day-card"><h3><span class="day-dot-yest"></span>前天</h3>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">花費</div><div class="kpi-value" style="font-size:16px">${fmt(sy,'money')}</div></div>
        <div class="kpi"><div class="kpi-label">購買</div><div class="kpi-value">${fmt(py)}</div></div>
        <div class="kpi"><div class="kpi-label">CPA ★</div><div class="kpi-value" style="font-size:15px">${fmt(cy,'money')}</div></div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">ROAS</div><div class="kpi-value">${fmt(ry,'x')}</div></div>
        <div class="kpi"><div class="kpi-label">CTR</div><div class="kpi-value">${fmt(y?.ctr,'pct')}</div></div>
      </div>
    </div>
  </div>`;
}

// ── 渲染 ──
function renderClient(ci, todayData, yesterdayData, adsToday, adsYesterday, extra={}){
  const content=document.getElementById('content-'+ci);
  const{today,yesterday}=getDateRange();
  content.innerHTML=`
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">昨天 ${today}（主）｜前天 ${yesterday}</div>

    <div class="daily-report-box">
      <div class="daily-report-header">
        <h2>📋 昨日廣告日報</h2>
        <button class="copy-btn" onclick="copyReport(${ci})">📋 複製口述稿</button>
      </div>
      <div class="daily-report-body" id="daily-report-${ci}">
        <div class="report-loading">⏳ 產生日報中...</div>
      </div>
    </div>

    <div class="section-title">廣告類型分組總覽</div>
    <div id="creative-summary-${ci}"><div class="creative-loading">載入中...</div></div>

    ${buildTopKPIs(todayData,yesterdayData)}

    <div class="section-title">詳細指標對比</div>
    ${buildMetricsTable(todayData,yesterdayData)}

    <div class="section-title" style="margin-top:24px">素材明細（依花費排序）</div>
    <div class="period-toggle">
      <button class="period-btn active" data-client="${ci}" data-period="1d" onclick="loadDetailPeriod(${ci},'1d')">昨天</button>
      <button class="period-btn" data-client="${ci}" data-period="7d" onclick="loadDetailPeriod(${ci},'7d')">近 7 天</button>
      <button class="period-btn" data-client="${ci}" data-period="14d" onclick="loadDetailPeriod(${ci},'14d')">近 14 天</button>
      <button class="period-btn" data-client="${ci}" data-period="30d" onclick="loadDetailPeriod(${ci},'30d')">近 30 天</button>
    </div>
    <div id="creative-${ci}"><div class="period-loading">載入中...</div></div>`;

  _reportCache[ci]={todayData,adsToday,extra}; // cache includes ads14d in extra
  if(todayData) document.getElementById('daily-report-'+ci).innerHTML=buildDailyReport(ci,todayData,adsToday,extra);
  document.getElementById('creative-summary-'+ci).innerHTML=buildCreativeSummary(ci,adsToday,adsYesterday);
  _periodCache[ci+'_1d']=adsToday;
  renderFlatTable(ci,adsToday,'1d');
}

async function loadClient(ci){
  const dot=document.getElementById('status-dot-'+ci);
  const txt=document.getElementById('status-text-'+ci);
  const errEl=document.getElementById('error-'+ci);
  dot.className='status-dot loading'; txt.textContent='資料載入中...'; errEl.innerHTML='';
  try{
    const data=await fetchClientData(ci);
    dot.className='status-dot ok'; txt.textContent='資料已更新';
    renderClient(ci,data.today,data.yesterday,data.adsToday||[],data.adsYesterday||[],{monthTotal:data.monthTotal,adsetCountToday:data.adsetCountToday,adsetCountYesterday:data.adsetCountYesterday,ads14d:data.ads14d||[]});
  }catch(e){
    dot.className='status-dot error'; txt.textContent='資料載入失敗';
    errEl.innerHTML=`<div class="error-msg">⚠️ 無法取得資料：${e.message}</div>`;
  }
}

function loadAllData(){
  const{today:d1,yesterday:d2}=getDateRange();
  document.getElementById('todayBadge').textContent='昨 '+d1+' / 前 '+d2;
  loadClient(0); loadClient(1);
}

function switchClient(idx){
  document.querySelectorAll('.client-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.client-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

loadAllData();
</script>
</body>
</html>
